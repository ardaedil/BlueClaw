services:
  blueclaw:
    image: node:22
    working_dir: /app
    volumes:
      - ./:/app
    command: bash -lc "npm install && npx prisma generate && npx prisma migrate deploy && npm run dev"
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: file:./blueclaw.db
      EBAY_MOCK_MODE: "true"
      SCHEDULER_ENABLED: "true"
